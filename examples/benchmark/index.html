<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Sipper Benchmark</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 20px; }
    table { border-collapse: collapse; width: 100%; }
    td, th { padding: 4px 8px; border: 1px solid #ddd; text-align: left; }
    .selected { background: #0074d9; color: white; }
    .framework { margin-bottom: 16px; border: 1px solid #ddd; border-radius: 8px; padding: 12px; }
    .framework h3 { margin: 0 0 8px 0; }
    .controls button { margin: 2px; padding: 4px 10px; cursor: pointer; font-size: 12px; }
    .results { margin-top: 8px; font-family: monospace; font-size: 12px; }
    .results div { margin: 1px 0; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .app-container { max-height: 200px; overflow: auto; font-size: 12px; }
    .comparison-table { margin-top: 12px; }
    .comparison-table th { background: #f5f5f5; }
    .comparison-table td { font-family: monospace; }
    .run-all { padding: 12px 32px; font-size: 16px; cursor: pointer; margin: 16px 0; background: #0074d9; color: white; border: none; border-radius: 6px; }
    .run-all:hover { background: #005fa3; }
  </style>
</head>
<body>
  <h1>Sipper Benchmark</h1>
  <p>JS Framework Benchmark operations — Sipper vs React vs Solid vs Vanilla JS</p>

  <button class="run-all" onclick="runAll()">Run All Benchmarks</button>

  <div id="comparison"></div>

  <div class="grid">
    <div class="framework">
      <h3>Sipper</h3>
      <div class="controls">
        <button onclick="run('sipper','create')">Create 1K</button>
        <button onclick="run('sipper','update')">Update 10th</button>
        <button onclick="run('sipper','swap')">Swap</button>
        <button onclick="run('sipper','select')">Select</button>
        <button onclick="run('sipper','delete')">Delete</button>
        <button onclick="run('sipper','clear')">Clear</button>
        <button onclick="run('sipper','append')">Append 1K</button>
        <button onclick="run('sipper','createMany')">Create 10K</button>
      </div>
      <div id="sipper-results" class="results"></div>
      <div id="sipper-app" class="app-container"></div>
    </div>

    <div class="framework">
      <h3>React 19</h3>
      <div class="controls">
        <button onclick="run('react','create')">Create 1K</button>
        <button onclick="run('react','update')">Update 10th</button>
        <button onclick="run('react','swap')">Swap</button>
        <button onclick="run('react','select')">Select</button>
        <button onclick="run('react','delete')">Delete</button>
        <button onclick="run('react','clear')">Clear</button>
        <button onclick="run('react','append')">Append 1K</button>
        <button onclick="run('react','createMany')">Create 10K</button>
      </div>
      <div id="react-results" class="results"></div>
      <div id="react-app" class="app-container"></div>
    </div>

    <div class="framework">
      <h3>Solid.js</h3>
      <div class="controls">
        <button onclick="run('solid','create')">Create 1K</button>
        <button onclick="run('solid','update')">Update 10th</button>
        <button onclick="run('solid','swap')">Swap</button>
        <button onclick="run('solid','select')">Select</button>
        <button onclick="run('solid','delete')">Delete</button>
        <button onclick="run('solid','clear')">Clear</button>
        <button onclick="run('solid','append')">Append 1K</button>
        <button onclick="run('solid','createMany')">Create 10K</button>
      </div>
      <div id="solid-results" class="results"></div>
      <div id="solid-app" class="app-container"></div>
    </div>

    <div class="framework">
      <h3>Vanilla JS (baseline)</h3>
      <div class="controls">
        <button onclick="run('vanilla','create')">Create 1K</button>
        <button onclick="run('vanilla','update')">Update 10th</button>
        <button onclick="run('vanilla','swap')">Swap</button>
        <button onclick="run('vanilla','select')">Select</button>
        <button onclick="run('vanilla','delete')">Delete</button>
        <button onclick="run('vanilla','clear')">Clear</button>
        <button onclick="run('vanilla','append')">Append 1K</button>
        <button onclick="run('vanilla','createMany')">Create 10K</button>
      </div>
      <div id="vanilla-results" class="results"></div>
      <div id="vanilla-app" class="app-container"></div>
    </div>
  </div>

  <script type="module" src="./runner.js"></script>
</body>
</html>
